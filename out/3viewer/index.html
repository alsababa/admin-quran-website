        <script>
            "use strict";
            String.prototype.hexEncode = function(){
            var hex, i;
            var result = "";
            for (i=0; i<this.length; i++) {
                hex = this.charCodeAt(i).toString(16);
                result += ("000"+hex).slice(-4);
            }
                return result
            }
            let currentAnimationName = "";
            let currentAnimation = null;
            let anim_scene = null;
            var rn_call_time = 0;
            var comm_delay = 0;
            function sendToRN(arg){
                window.webViewBridge.send('handleDataReceived', arg, function(res) {
                }, function(err) {  
                });
            }
            function debugToRN(arg){
                window.webViewBridge.send('debugMessage', "got:" + arg, function(res) {
                }, function(err) {  
                });
            }
            
            function playDeAnimation(anToPlay, source_letter = "", cross_time = 1, isFirstLetter = false) {                                                  
                if (isFirstLetter) {
                    anim_scene.stopAllAnimations();
                    currentAnimation = null;
                }
                comm_delay = window.performance.now() - rn_call_time;                    
                play_name(anToPlay, source_letter, cross_time);
            }

            function play_name(name, source_letter, cross_time){  

                const action = scene.getAnimationGroupByName(name);
                
                currentAnimationName = name;
                debugToRN(name);
                
                if (currentAnimation == null){    
                    action.play();    
                }else
                {                        
                    action.syncAllAnimationsWith(currentAnimation.animatables[0]);
                    action.play();    
                }
                action.onAnimationGroupEndObservable.addOnce(function (){
                    // on finish
                    sendToRN(currentAnimationName);                        
                })
                currentAnimation = action;    
                
            }
            function setAnimationSpeed(speed) {                
                anim_scene.animationTimeScale = speed;
            }

        </script>

        if (!engine) throw 'engine should not be null.';
