    <script>
        "use strict";
        String.prototype.hexEncode = function () {
            var hex, i;
            var result = "";
            for (i = 0; i < this.length; i++) {
                hex = this.charCodeAt(i).toString(16);
                result += ("000" + hex).slice(-4);
            }
            return result
        }
        let currentAnimationName = "";
        let currentAnimation = null;
        let anim_scene = null;
        var rn_call_time = 0;
        var comm_delay = 0;
        function sendToRN(arg) {
            window.webViewBridge.send('handleDataReceived', arg, function (res) {
            }, function (err) {
            });
        }
        function debugToRN(arg) {
            window.webViewBridge.send('debugMessage', "got:" + arg, function (res) {
            }, function (err) {
            });
        }

        function playDeAnimation(anToPlay, source_letter = "", cross_time = 1, isFirstLetter = false) {
            if (isFirstLetter) {
                anim_scene.stopAllAnimations();
                currentAnimation = null;
            }
            comm_delay = window.performance.now() - rn_call_time;
            play_name(anToPlay, source_letter, cross_time);
        }

        function play_name(name, source_letter, cross_time) {

            const action = scene.getAnimationGroupByName(name);

            currentAnimationName = name;
            debugToRN(name);

            if (currentAnimation == null) {
                action.play();
            } else {
                action.syncAllAnimationsWith(currentAnimation.animatables[0]);
                action.play();
            }
            action.onAnimationGroupEndObservable.addOnce(function () {
                // on finish
                sendToRN(currentAnimationName);
            })
            currentAnimation = action;

        }
        function setAnimationSpeed(speed) {
            anim_scene.animationTimeScale = speed;
        }

    </script>

    <script>
        var canvas = document.getElementById("renderCanvas");

        var engine = null;
        var scene = null;
        var sceneToRender = null;
        var createDefaultEngine = function () { return new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true, disableWebGL2Support: false }); };

        var delayCreateScene = function () {
            // Create a scene.
            BABYLON.Animation.AllowMatricesInterpolation = true;
            var scene = new BABYLON.Scene(engine);

            BABYLON.SceneLoader.ShowLoadingScreen = false;
            // Create a default skybox with an environment.
            // var hdrTexture = BABYLON.CubeTexture.CreateFromPrefilteredData("textures/environment.dds", scene);
            // var currentSkybox = scene.createDefaultSkybox(hdrTexture, true);            
            // Append glTF model to scene.            
            // BABYLON.SceneLoader.Append("./new_AAHS/mutipleAnim(2)/", "SoudiFinalTakes.glb", scene, function (scene) {
            //BABYLON.SceneLoader.Append("./new/", "modelGeo.glb", scene, function (scene) {    
            // BABYLON.SceneLoader.Append("./new2/", "deafultCharII.glb", scene, function (scene) {    
            BABYLON.SceneLoader.Append("./deafultCharIII/", "deafultCharIII.glb", scene, function (scene) {

                window.gscene = scene;
                // Create a default arc rotate camera and light.
                scene.createDefaultCameraOrLight(true, true, true);
                scene.createDefaultEnvironment({
                    createSkybox: false, // Disabled skybox to show CSS background pattern
                    skyboxSize: 150,
                    enableGroundShadow: true,
                    groundYBias: 1
                });
                scene.environmentIntensity = 1.2; // Brighter environment for gold reflections
                // scene.ambientColor = new BABYLON.Color3(6, 6, 6);

                scene.imageProcessingConfiguration.exposure = 1.0;
                scene.imageProcessingConfiguration.contrast = 1.0;

                //var light = new BABYLON.HemisphericLight("HemiLight", new BABYLON.Vector3(1, 1, 1), scene);                
                //light.intensity = 0;//.2;

                var dlight = new BABYLON.DirectionalLight("DHemiLight", new BABYLON.Vector3(-0.385, -0.592, -0.708), scene)
                dlight.position = new BABYLON.Vector3(0, 10, 10);
                dlight.autoUpdateExtends = true;
                dlight.shadowEnabled = true;
                dlight.autoCalcShadowZBounds = true;
                dlight.intensity = 3;

                var camera = scene.activeCamera;
                camera.panningSensibility = 0; //prevent moving
                var camerasBorderFunction = function () {
                    //Lock Angle        
                    camera.beta = (Math.PI / 2);
                };

                scene.registerBeforeRender(camerasBorderFunction);




                scene.getMeshByName("Mesh_Hi").receiveShadows = true;

                var shadowGenerator = new BABYLON.ShadowGenerator(1024, dlight);

                // SHADOW ENABLE:
                // shadowGenerator.getShadowMap().renderList.push(scene.getMeshByName("Mesh_Hi"));
                // shadowGenerator.useBlurExponentialShadowMap = true;

                scene.clearColor = new BABYLON.Color4(0, 0, 0, 0);


                // The default camera looks at the back of the asset.
                // Rotate the camera by 180 degrees to the front of the asset.

                scene.activeCamera.alpha += Math.PI;
                scene.activeCamera.radius = 0.9;
                scene.activeCamera.fov = 0.5;
                // scene.activeCamera.targetScreenOffset.y = 100;
                scene.activeCamera.lowerRadiusLimit = 2.1;
                scene.activeCamera.upperRadiusLimit = 2.1;

                //scene.activeCamera.inputs.removeByType("FreeCameraKeyboardMoveInput");
                //scene.activeCamera.inputs.removeByType("FreeCameraMouseMoveInput");
                scene.activeCamera.targetScreenOffset.y = -0.2;
                window.c = scene.activeCamera;
                // scene.activeCamera.inputs.remove(scene.activeCamera.inputs.attached.mousewheel);

                // scene.activeCamera
                // BABYLON.SceneLoader.ImportAnimationsAsync("./new_AAHS/mutipleAnim(2)/", "mutipleAnim (5).glb", scene).then(function (scene) {
                // BABYLON.SceneLoader.ImportAnimationsAsync("./new/", "animSL2.glb", scene).then(function (scene) {


                BABYLON.SceneLoader.ImportAnimationsAsync("./new2/", "SLAplhabet.glb", scene).then(function (scene) {
                    anim_scene = scene;
                    window.a = anim_scene;
                    // do something with the scene

                    anim_scene.animationsEnabled = true;
                    anim_scene.animationPropertiesOverride = new BABYLON.AnimationPropertiesOverride();
                    anim_scene.animationPropertiesOverride.enableBlending = true;
                    anim_scene.animationPropertiesOverride.blendingSpeed = 0.05;
                    anim_scene.animationPropertiesOverride.loopMode = 1;
                    anim_scene.animationTimeScale = 1.2;
                    anim_scene.stopAllAnimations();
                    // start by end animation
                    // const sambaAnim = scene.getAnimationGroupByName("06dd");
                    // sambaAnim.start();


                    var assignATrigger = anim_scene.getNodeByName("RootNode");
                    for (var n = 0; n < anim_scene.getNodes().length; n++) {
                        if (anim_scene.getNodes()[n].material != null)
                            anim_scene.getNodes()[n].material.backFaceCulling = false;
                    }

                    assignATrigger.setAbsolutePosition(new BABYLON.Vector3(0, -0.075, 0))


                });


                BABYLON.SceneLoader.ImportAnimationsAsync("./deafultCharIII/", "fatehaAnim.glb", scene).then(function (scene) {
                    anim_scene = scene;
                    window.a = anim_scene;
                    // do something with the scene

                    anim_scene.animationsEnabled = true;
                    anim_scene.animationPropertiesOverride = new BABYLON.AnimationPropertiesOverride();
                    anim_scene.animationPropertiesOverride.enableBlending = true;
                    anim_scene.animationPropertiesOverride.blendingSpeed = 0.05;
                    anim_scene.animationPropertiesOverride.loopMode = 1;
                    anim_scene.animationTimeScale = 1.2;

                    // Auto-start the first animation group to ensure the character is "moving"
                    if (anim_scene.animationGroups && anim_scene.animationGroups.length > 0) {
                        console.log("Animation groups found:", anim_scene.animationGroups.map(g => g.name));
                        // Play the first group by default, ensure it's descriptive
                        anim_scene.animationGroups[0].play(true);
                    }

                    var assignATrigger = anim_scene.getNodeByName("RootNode");
                    for (var n = 0; n < anim_scene.getNodes().length; n++) {
                        if (anim_scene.getNodes()[n].material != null)
                            anim_scene.getNodes()[n].material.backFaceCulling = false;
                    }

                    assignATrigger.setAbsolutePosition(new BABYLON.Vector3(0, -0.075, 0))

                    // Animation-Sync Translation Logic
                    const verses = [
                        "بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ",
                        "الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ",
                        "الرَّحْمَنِ الرَّحِيمِ",
                        "مَالِكِ يَوْمِ الدِّينِ",
                        "إِيَّاكَا نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ",
                        "اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ",
                        "صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ"
                    ];
                    
                    const container = document.getElementById('translation-container');
                    const textDisplay = document.getElementById('verse-text');
                    
                    if (anim_scene.animationGroups && anim_scene.animationGroups.length > 0) {
                        const mainAnim = anim_scene.animationGroups[0];
                        container.classList.add('visible');
                        
                        scene.onBeforeRenderObservable.add(() => {
                            // Robust progress calculation based on loop time
                            const currentTime = mainAnim.animatables[0] ? mainAnim.animatables[0].masterFrame : 0;
                            const totalFrames = mainAnim.to;
                            const progress = currentTime / totalFrames;
                            
                            const index = Math.floor(progress * verses.length);
                            const safeIndex = Math.min(index, verses.length - 1);
                            
                            if (textDisplay.innerText !== verses[safeIndex]) {
                                textDisplay.style.opacity = 0;
                                setTimeout(() => {
                                    textDisplay.innerText = verses[safeIndex];
                                    textDisplay.style.opacity = 1;
                                }, 300);
                            }
                        });
                    }
                });












            });




            return scene;
        };
        window.initFunction = async function () {
            var asyncEngineCreation = async function () {
                try {
                    return createDefaultEngine();
                } catch (e) {
                    console.log("the available createEngine function failed. Creating the default engine instead");
                    return createDefaultEngine();
                }
            }

            window.engine = await asyncEngineCreation();
            if (!engine) throw 'engine should not be null.';
            window.scene = delayCreateScene();
        };
        initFunction().then(() => {
            sceneToRender = scene

            engine.runRenderLoop(function () {
                if (sceneToRender && sceneToRender.activeCamera) {
                    // Add subtle breathing/orbiting effect to the camera for "improved movement"
                    const time = Date.now() * 0.001;
                    sceneToRender.activeCamera.alpha += Math.sin(time * 0.5) * 0.001;
                    sceneToRender.activeCamera.beta = (Math.PI / 2) + Math.sin(time * 0.3) * 0.02;

                    sceneToRender.render();
                }
            });
        });

        // Resize
        window.addEventListener("resize", function () {
            engine.resize();
        });

        window.addEventListener("load", function () {

            window.webViewBridge.send('loaded', "", function (res) {
            }, function (err) {
            });

        });


    </script>
